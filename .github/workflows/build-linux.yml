#name: Build Linux
on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
jobs:
  build_linux:
    name: Flathub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout application
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Common setup
        uses: ./.github/actions/flutter-common
        with:
          decrypt-playstore: 'false'

      - name: Build application for linux
        run: |
          sudo apt update
          sudo apt install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
          flutter build linux --release
          cd flatpak/scripts
          dart pub get
          dart flatpak_packager.dart --meta ../flatpak_meta.json --addTodaysVersion ${{inputs.release_tag}}

      - uses: actions/upload-artifact@v4
        with:
          name: builds-linux
          path: |
            flatpak/scripts/flatpak_generator_exports/wger-linux-x86_64.tar.gz
            flatpak/scripts/flatpak_generator_exports/wger-linux-x86_64.sha256