name: Build release artefacts
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
    branches:
      - feature/build-process
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, use X.Y.Z format'
        required: true
        type: string
        default: 1.2.3

env:
  FLUTTER_VERSION: 3.29.2
  RUBY_VERSION: 3.2
  JAVA_VERSION: 17

jobs:

  determine_version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version_step.outputs.RELEASE_VERSION }}
    steps:
      - name: Checkout application
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed to push changes

      - name: Common flutter setup
        uses: ./.github/actions/flutter-common
        with:
          flutter-version: ${{env.FLUTTER_VERSION}}
          java-version: ${{env.JAVA_VERSION}}
          decrypt-playstore: 'false'

      - name: Extract version from tag or input
        id: version_step
        run: |
          #          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          #            RELEASE_VERSION="${{ github.ref_name }}"
          #          else
          #            RELEASE_VERSION="${{ github.event.inputs.version }}"
          #            if [[ ! "${{ github.event.inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          #              echo "Error: Input version '${{ github.event.inputs.version }}' is not in X.Y.Z format."
          #              exit 1
          #            fi
          #          fi
          
          # DELETE ME WHEN RELEASED!!!
               RELEASE_VERSION=""
          
               echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_OUTPUT

      - name: Bump pubspec version
        run: |
          BUILD=$(flutter pub run cider version | cut -d '+' -f 2)
          flutter pub run cider version 1.8.0+${BUILD} # flutter pub run cider version ${{ steps.version_step.outputs.RELEASE_VERSION }}+${BUILD}
          flutter pub run cider bump build
          echo 
          echo "VERSION_BUMPED to $(flutter pub run cider version)"

  #      - name: Commit pubspec
  #        run: |
  #          git config user.name Github-Actions
  #          git config user.email github-actions@github.com
  #          git add pubspec.yaml
  #          git tag ${{ steps.version_step.outputs.RELEASE_VERSION }}
  #          git commit -m "Bump version to $( flutter pub run cider version )"
  #          git push origin HEAD:${{ github.ref_name == 'refs/heads/main' && 'main' || github.ref_name == 'refs/heads/master' && 'master' || github.ref_name }}
  

  build_linux:
    name: Build flathub
    needs: determine_version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout application
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.determine_version.outputs.RELEASE_VERSION }}

      - name: Common flutter setup
        uses: ./.github/actions/flutter-common
        with:
          flutter-version: ${{env.FLUTTER_VERSION}}
          java-version: ${{env.JAVA_VERSION}}
          decrypt-playstore: 'false'

      - name: Build application for linux
        run: |
          sudo apt update
          sudo apt install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
          flutter build linux --release
          cd flatpak/scripts
          dart pub get
          dart flatpak_packager.dart --meta ../flatpak_meta.json --addTodaysVersion ${{ steps.version_step.outputs.RELEASE_VERSION }}
      #          dart flatpak_packager.dart --meta ../flatpak_meta.json --addTodaysVersion ${{ inputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: builds-linux
          path: |
            flatpak/scripts/flatpak_generator_exports/wger-linux-x86_64.tar.gz
            flatpak/scripts/flatpak_generator_exports/wger-linux-x86_64.sha256

  build_android_apk:
    name: Build android APK file
    needs: determine_version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout application
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.determine_version.outputs.RELEASE_VERSION }}

      - name: Common flutter setup
        uses: ./.github/actions/flutter-common
        with:
          flutter-version: ${{env.FLUTTER_VERSION}}
          java-version: ${{env.JAVA_VERSION}}
          decrypt-playstore: 'true'
          key-playstore: ${{ secrets.DECRYPTKEY_PLAYSTORE }}
          key-playstore-sign: ${{ secrets.DECRYPTKEY_PLAYSTORE_SIGNING_KEY }}
          key-properties: ${{ secrets.DECRYPTKEY_PROPERTIES }}

      - name: SDK and NDK cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk
          key: sdk-cache-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml') }}

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: builds-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build_android_aab:
    name: Build android AAB file
    needs: determine_version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout application
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.determine_version.outputs.RELEASE_VERSION }}

      - name: Common flutter setup
        uses: ./.github/actions/flutter-common
        with:
          flutter-version: ${{env.FLUTTER_VERSION}}
          java-version: ${{env.JAVA_VERSION}}
          decrypt-playstore: 'true'
          key-playstore: ${{ secrets.DECRYPTKEY_PLAYSTORE }}
          key-playstore-sign: ${{ secrets.DECRYPTKEY_PLAYSTORE_SIGNING_KEY }}
          key-properties: ${{ secrets.DECRYPTKEY_PROPERTIES }}

      - name: Build AAB
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: builds-aab
          path: build/app/outputs/bundle/release/app-release.aab

  build_ios:
    name: Build iOS
    needs: determine_version
    runs-on: macos-latest
    steps:
      - name: Checkout application
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.determine_version.outputs.RELEASE_VERSION }}

      - name: Common flutter setup
        uses: ./.github/actions/flutter-common
        with:
          flutter-version: ${{env.FLUTTER_VERSION}}
          java-version: ${{env.JAVA_VERSION}}
          decrypt-playstore: 'false'

      - name: Build .app
        run: flutter build ios --release --no-codesign

      - uses: actions/upload-artifact@v4
        with:
          name: builds-ios
          path: build/ios/iphoneos/Runner.app

  build_macos:
    name: Build macOS
    needs: determine_version
    runs-on: macos-latest
    steps:
      - name: Checkout application
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.determine_version.outputs.RELEASE_VERSION }}

      - name: Common flutter setup
        uses: ./.github/actions/flutter-common
        with:
          flutter-version: ${{env.FLUTTER_VERSION}}
          java-version: ${{env.JAVA_VERSION}}
          decrypt-playstore: 'false'

      - name: Build .app
        run: flutter build macos --release

      - uses: actions/upload-artifact@v4
        with:
          name: builds-macos
          path: build/macos/Build/Products/Release/wger.app

  build_windows:
    name: Build Windows
    needs: determine_version
    runs-on: windows-latest
    steps:
      - name: Checkout application
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.determine_version.outputs.RELEASE_VERSION }}

      - name: Common flutter setup
        uses: ./.github/actions/flutter-common
        with:
          flutter-version: ${{env.FLUTTER_VERSION}}
          java-version: ${{env.JAVA_VERSION}}
          decrypt-playstore: 'false'

      - name: Build .exe
        run: flutter build windows --release -v

      - uses: actions/upload-artifact@v4
        with:
          name: builds-windows
          path: build\windows\x64\runner\Release\wger.exe

  upload_play_store:
    if: false
    name: Upload to Play Store
    runs-on: ubuntu-latest
    needs:
      - build_android_aab
    steps:
      - name: Checkout application
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{env.RUBY_VERSION}}

      - name: Download builds
        uses: actions/download-artifact@v4
        with:
          path: /tmp/

      - name: Decrypt config files
        run: |
          cd ./fastlane/metadata/envfiles
          chmod +x ./decrypt_secrets.sh
          ./decrypt_secrets.sh
        env:
          DECRYPTKEY_PLAYSTORE: ${{ secrets.DECRYPTKEY_PLAYSTORE }}
          DECRYPTKEY_PLAYSTORE_SIGNING_KEY: ${{ secrets.DECRYPTKEY_PLAYSTORE_SIGNING_KEY }}
          DECRYPTKEY_PROPERTIES: ${{ secrets.DECRYPTKEY_PROPERTIES }}

      - name: Upload build to Play Store
        run: |
          mkdir -p ./build/app/outputs/bundle/release/
          cp /tmp/builds-aab/app-release.aab ./build/app/outputs/bundle/release/app-release.aab
          bundle install
          bundle exec fastlane android test_configuration

  upload_app_store:
    if: false
    name: Upload to App Store (placeholder)
    runs-on: ubuntu-latest
    needs:
      - build_ios
    steps:
      - name: Checkout application
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{env.RUBY_VERSION}}

      - name: Download builds
        uses: actions/download-artifact@v4
        with:
          path: /tmp/

      #
      # Replace with the iOS upload steps
      #

      - name: Decrypt config files
        run: |
          cd ./fastlane/metadata/envfiles
          chmod +x ./decrypt_secrets.sh
          ./decrypt_secrets.sh
        env:
          DECRYPTKEY_PLAYSTORE: ${{ secrets.DECRYPTKEY_PLAYSTORE }}
          DECRYPTKEY_PLAYSTORE_SIGNING_KEY: ${{ secrets.DECRYPTKEY_PLAYSTORE_SIGNING_KEY }}
          DECRYPTKEY_PROPERTIES: ${{ secrets.DECRYPTKEY_PROPERTIES }}

      - name: Upload build to Play Store
        run: |
          mkdir -p ./build/app/outputs/bundle/release/
          cp /tmp/builds-aab/app-release.aab ./build/app/outputs/bundle/release/app-release.aab
          bundle install
          bundle exec fastlane android test_configuration

  make_gh_release:
    if: false
    name: Make Github Release
    runs-on: ubuntu-latest
    needs:
      - upload_play_store
      - upload_app_store
      - build_android_apk
      - build_linux
      - build_macos
      - build_windows

    steps:
      - name: Download builds
        uses: actions/download-artifact@v4

      - name: Make Github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          files: |
            builds-aab/app-release.aab
            builds-apk/app-release.apk
            builds-linux/wger-linux-x86_64.tar.gz
            builds-linux/wger-linux-x86_64.sha256
            builds-ios/Runner.app
            builds-macos/wger.app

  generate_fathub_manifest:
    if: false
    runs-on: ubuntu-latest
    name: Upload flathub manifest
    needs:
      - make_gh_release
    steps:
      - name: Checkout application
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.determine_version.outputs.RELEASE_VERSION }}

      - name: Generate manifest
        run: |
          cd flatpak/scripts
          dart pub get
          dart manifest_generator.dart --meta ../flatpak_meta.json --github
          mkdir ../../flathub
          cp flatpak_generator_exports/de.wger.flutter.json ../../flathub
          cp flatpak_generator_exports/flathub.json ../../flathub

      - name: Push updated config to flathub repository
        uses: cpina/github-action-push-to-another-repository@main
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        with:
          source-directory: flathub
          destination-github-username: wger-project
          destination-repository-name: de.wger.flutter
          user-email: github-actions@github.com
          target-branch: release-${{ inputs.version }}
          create-target-branch-if-needed: true
          commit-message: Update to ${{ inputs.version }}

