on:
  workflow_call:
    inputs:
      app_version:
        required: true
        type: string

jobs:
  determine_version:
    name: Create tag
    runs-on: ubuntu-latest
    steps:

      - name: Checkout application
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed to push changes

      - name: Common flutter setup
        uses: ./.github/actions/flutter-common
        with:
          decrypt-playstore: 'false'

      - name: Validate version
        run: |
          RELEASE_VERSION="${{ inputs.app_version }}"
          if [[ ! "${{ inputs.app_version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Input version '${{ inputs.app_version }}' is not in X.Y.Z format."
            exit 1
          fi

      - name: Bump pubspec version
        run: |
          BUILD=$(flutter pub run cider version | cut -d '+' -f 2)
          flutter pub run cider version ${{ inputs.app_version  }}+${BUILD}
          flutter pub run cider bump build
          echo "version bumped to $(flutter pub run cider version)"

