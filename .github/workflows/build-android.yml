name: Build Android
on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
    secrets:
      DECRYPTKEY_PLAYSTORE:
        required: true
      DECRYPTKEY_PLAYSTORE_SIGNING_KEY:
        required: true
      DECRYPTKEY_PROPERTIES:
        required: true
jobs:
  build_android_apk:
    name: APK file
    runs-on: ubuntu-latest
    steps:
      - name: Checkout application
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Common flutter setup
        uses: ./.github/actions/flutter-common
        with:
          setup-java: 'true'
          decrypt-playstore: 'true'
          key-playstore: ${{ secrets.DECRYPTKEY_PLAYSTORE }}
          key-playstore-sign: ${{ secrets.DECRYPTKEY_PLAYSTORE_SIGNING_KEY }}
          key-properties: ${{ secrets.DECRYPTKEY_PROPERTIES }}

      - name: SDK and NDK cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk
          key: sdk-cache-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml') }}

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: builds-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build_android_aab:
    name: AAB file
    runs-on: ubuntu-latest
    steps:
      - name: Checkout application
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Common setup
        uses: ./.github/actions/flutter-common
        with:
          setup-java: 'true'
          decrypt-playstore: 'true'
          key-playstore: ${{ secrets.DECRYPTKEY_PLAYSTORE }}
          key-playstore-sign: ${{ secrets.DECRYPTKEY_PLAYSTORE_SIGNING_KEY }}
          key-properties: ${{ secrets.DECRYPTKEY_PROPERTIES }}

      - name: Build AAB
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: builds-aab
          path: build/app/outputs/bundle/release/app-release.aab